name: Deploy to Prod

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Prod Environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.PROD_AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: CDK Synth
        run: npx cdk synth --context env=prod

      - name: CDK Diff
        run: npx cdk diff --context env=prod

      - name: CDK Deploy
        run: npx cdk deploy --context env=prod --require-approval never
